<h2 id="googles-agentic-ai-ivr-stack">Google's Agentic AI IVR Stack</h2>
<ul>
<li><strong>ADK:</strong> Builds the agents, like a customer service bot</li>
<li><strong>A2A:</strong> Enables teamwork, allowing the bot to escalate issues to a billing agent built on a different platform</li>
<li><strong>Gemini Live:</strong> Acts as a layer to convert human speech into usable AI tokens in real time</li>
<li><strong>MCP:</strong> Connects agents to data and external APIs</li>
<li><strong>LLMs:</strong> Any models can work with ADK. Gemini models are better equipped for tool use (according to Google)</li>
<li><strong>CI/CD:</strong> Cloud Build &amp; Agent Orchestration will be needed to roll out the project once built</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<h2 id="about-adk">About ADK</h2>
<p>ADK (App Development Kit) is an agentic chatbot framework made by Google. ADK consists of an SDK which helps developers design and deploy AI Agents. Currently ADK is best supported in Python, with Java bindings also available.</p>
<p><strong>ADK is:</strong></p>
<ul>
<li>Model Agnostic</li>
<li>Deployment Agnostic</li>
<li>Interoperable with other technology</li>
</ul>

<h2 id="adk-compared-to-dialogflow-playbooks">ADK Compared to Dialogflow Playbooks</h2>
<p>ADK works in a very similar manner to Dialogflow agents but there are some key differences:</p>
<ul>
<li>An ADK agent powered by an LLM is analogous to a playbook</li>
<li>Developers handle additional routing on their own with Python</li>
<li>Compared to playbooks, ADK does not have examples capabilities - developers need to introduce few-shot prompting instead</li>
<li>ADK does not handle NLU intent detection</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<header><a href="#1" title=" ">◇ ADK</a></header>
<h2 id="adk-core-capabilities">ADK Core Capabilities</h2>
<ul>
<li><strong>Orchestration:</strong> Works via LLM decisions by multi-agents during execution or by developer decisions. ADK uses sequential, loop, and parallel agent types to manage orchestration</li>
<li><strong>Multiple subagents:</strong> No A2A needed for internal coordination</li>
<li><strong>Tools:</strong> Work via Python functions. Agents read docstrings attached to Python functions to understand how to interface with them. Users have access to a tool ecosystem maintained by Google</li>
<li><strong>Development:</strong> Developers define core behavior and logic via agent prompts (similar to playbooks) and Python methods</li>
<li><strong>Memory:</strong> Manage agent lifecycles, state, and memory. ADK offers short-term session state memory and long-term knowledge options</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<li><strong>Agent:</strong> Worker unit for tasks</li>
<li><strong>Tools:</strong> Can be either Python functions or tools built into ADK by Google
<ul>
<li>AIs have the option to use Google Search without any extra setup</li>
<li>Documentation strings are essential for creating tools in ADK</li>

<li><strong>Callbacks:</strong> Functions called before or after agent, model interaction, or tool use</li>
<li><strong>Session Management:</strong>
<ul>
<li>Context is the session</li>
<li>History is a log of chat events</li>
<li>State represents agent's working memory</li>
</ul>
</li>
<li><strong>Events:</strong> Basic units of data representing conversation flow</li>
</ul>

<header><a href="#1" title=" ">◇ ADK</a></header>
<h2 id="important-data-types-classes-and-functions">Important Data Types, Classes and Functions</h2>
<ul>
<li><strong>Callbacks:</strong> Custom code snippets written into points in the agent's process for checks, logging, or behavior modifications</li>
<li><strong>Grounding:</strong> ADK agents can be &quot;Grounded&quot; by using Google Search as a tool</li>
<li><strong>Memory:</strong> Different from state. Allows agents to recall information across multiple sessions
<ul>
<li><strong>SessionService:</strong> Manages conversation history and state for different users and sessions</li>
<li><strong>InMemorySessionService:</strong> Simple implementation storing everything in memory</li>
<li><strong>Session State:</strong> Tied to a specific user session, persists across conversational turns</li>
</ul>
</li>
<li><strong>Artifact Management:</strong> Classes designed to allow agents to handle files or binary data</li>
<li><strong>Runner:</strong> Data class responsible for handling all execution flow</li>
<li><strong>Agent Types:</strong>
<ul>
<li><strong>LlmAgent:</strong> Most essential class for quickly creating agents</li>
<li><strong>Sequential Agent:</strong> Executes sub-agents in order</li>
<li><strong>Loop Agent:</strong> Runs sequential agents until a condition is met</li>
<li><strong>Parallel Agent:</strong> Runs agents asynchronously</li>
<li><strong>Custom Agents:</strong> Inherit from BaseAgent for complex state management</li>
</ul>
</li>
</ul>
<footer>Accenture 2025</footer>

<header><a href="#1" title=" ">◇ ADK</a></header>
<h3 id="important-data-types-classes-and-functions-1">Important Data Types, Classes and Functions</h3>
<ul>
<li>Callbacks: custom code snippets written into points in the agents process allowing for checks, logging or behavior modifications. set the callback in agent initialization, -&gt; before_model_callback=block_keyword_guardrail</li>
<li>Grounding: ADK agents can be &quot;Grounded&quot; by using google search as a tool.</li>
<li>Memory: Memory is different from state. Allows agents to recall information across multiple sessions.
<ul>
<li>SessionService: Responsible for managing conversation history and state for different users and sessions.</li>
<li>The InMemorySessionService is a simple implementation that stores everything in memory, suitable for testing and simple applications. It keeps track of the messages exchanged.</li>
<li>Session state: Tied to a specific user session. Persists information across multiple conversational turns within that session.</li>
<li>Agents are able to insert data into the session state with the output key parameter. Agents have access to elements of the session state by putting the state data name in curly brackets.</li>
</ul>
</li>
<li>Artifact managment: There are classes desinged to allow agents to handle files or binary data.
<ul>
<li>ToolContext: Provides the context for a tool invocation, provides access to the invocation context, function call ID, event actions, and authentication response. Provides memory retrieval methods and methods for listing artifacts.</li>
</ul>
</li>
<li>Runner: This data class is responsible for handling all execution flow, orchestrates agent interactions based on events and coordinates with backend services.</li>
<li>Agent: Agent class is a label for the llm class. There are llm agents and workflow agents.
<ul>
<li>LlmAgent: This class is the most essential class for quickly creating agents. Every ADK package should have a root_agent object exposed for the ADK SDK and front end tools to use.</li>
<li>Sequential Agent: Agent class which will execute sub agents in order. Useful for determenistic steps where tasks need to be completed in order.</li>
<li>Loop Agent: This is a specialized agent class which runs sequential agents until a specific condition is met.</li>
<li>Parallel Agent: Runs agents asyncronously. If the output of agent work is data, a merger agent might be necessary.</li>
<li>Custom Agents: ADK allows users to inherit from the BaseAgent class in order to create agents with more complex state managment or determenistic flows.<br />
Overriding the _run_async_impl method is the primary way of defining behavior on agent invocation.<br />
The heart of any custom agent is the _run_async_impl method. This is where you define its unique behavior.</li>
<li>Driving classes: You can create a class whith a has a relationship with many agents and handles orchestration.<br />
Making custom classes or inheriting BaseAgent is very useful to handle complex things like A2A interaction.</li>
</ul>
</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<h2 id="about-a2a">About A2A</h2>
<p>While originally owned by Google, ownership of the A2A protocol has moved to the Linux Foundation, which is committed to keeping this technology open source.</p>
<p>A2A is an open standard, common language for AI agent communication and collaboration.</p>
<p><strong>A2A works with tools such as:</strong></p>
<ul>
<li>Google ADK</li>
<li>LangGraph</li>
<li>CrewAI</li>
<li>Genkit</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<h2 id="a2a-high-level-use-cases">A2A High-Level Use Cases</h2>
<p>At a high level, A2A is used to:</p>
<ul>
<li>Offer direct, standardized communication and collaboration between different AI agents, even if they are running as separate services or on different machines</li>
<li>Enable agents to discover each other's capabilities (via Agent Cards) and delegate tasks</li>
<li>Form a network of collaborating asynchronous AI agents</li>
</ul>

<header><a href="#1" title=" ">◇ A2A</a></header>
<h2 id="a2a-facilitates-interaction-between-3-key-parties">A2A Facilitates Interaction Between 3 Key Parties</h2>
<ul>
<li><strong>End User:</strong> A human</li>
<li><strong>Client Agent:</strong> Responsible for creating requests and handling end user actions
<ul>
<li>Fetch and understand agent cards</li>
<li>Send messages</li>
<li>Process responses</li>
<li>Handle &amp; manage Task IDs for tasks which take time and ping for task completion</li>
</ul>
</li>
<li><strong>Remote Agent:</strong> Responsible for acting on requests made, taking correct action
<ul>
<li>Host agent cards with skills and capability info</li>
<li>Handle incoming agent requests and execute them via agentExecutor</li>
</ul>
</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<header><a href="#1" title=" ">◇ A2A</a></header>
<h2 id="main-capabilities-of-a2a">Main Capabilities of A2A</h2>
<ol>
<li>
<p><strong>Agent Discovery:</strong></p>
<ul>
<li>Agents advertise capabilities using &quot;Agent Cards&quot; in JSON format</li>
<li>Agent cards act like robots.txt to help classify and index agents</li>
<li>Clients know when and how to utilize agents</li>
</ul>
</li>
<li>
<p><strong>UX Negotiation:</strong></p>
<ul>
<li>Clients and agents agree on communication methods</li>
<li>Negotiate proper format and user interface capabilities</li>
</ul>
</li>
<li>
<p><strong>Task Management:</strong></p>
<ul>
<li>Communicate task status, changes, and dependencies throughout execution</li>
<li>&quot;Task&quot; object has a defined lifecycle</li>
</ul>
</li>
<li>
<p><strong>Collaboration:</strong></p>
<ul>
<li>Agents send messages to each other to convey context, responses, artifacts, or user instructions</li>
<li>Dynamic interactions</li>
<li>Agents request clarifications from end users</li>
</ul>
</li>
</ol>
<footer>Accenture 2025</footer>
</section>

<header><a href="#1" title=" ">◇ A2A</a></header>
<h2 id="a2a-agent-interaction-pipeline">A2A Agent Interaction Pipeline</h2>
<p><strong>End-User → Client → Client Agent → Agent Mesh</strong></p>
<p><strong>Interaction Timeline:</strong></p>
<ol>
<li><strong>Agent Discovery:</strong> Client Agent searches remote agent to find capabilities through agent.json file</li>
<li><strong>Interactions:</strong> Bots send JSON-RPC messages to each other over HTTPS containing A2A Objects:
<ul>
<li><strong>Messages:</strong> One turn in the operation
<ul>
<li>Roles (user/agent)</li>
<li>Parts (text, file, or JSON)</li>
</ul>
</li>
<li><strong>Agent Executor:</strong> Links protocol plumbing to agent logic</li>
<li><strong>Task Objects:</strong> Contains ID and status
<ul>
<li>Client agent can call tasks get function to query task completion status</li>
<li>Eventually returns task as completed with summary in task.artifacts</li>
</ul>
</li>
</ul>
</li>
<li><strong>Streaming:</strong> Server agent can push updates to a task as they happen instead of polling</li>
</ol>
<footer>Accenture 2025</footer>
</section>

<header><a href="#1" title=" ">◇ A2A</a></header>
<h2 id="agent-card">Agent Card</h2>
<p>JSON document which A2A server makes publicly available, usually stored at <code>.well-known/agent.json</code> (analogous to robots.txt or business card).</p>
<p><strong>Agent cards are crucial for creating an agent network:</strong></p>
<ul>
<li>Name, Description, Version: Basic identity info</li>
<li>URL: Endpoint where the A2A service can be reached</li>
<li>Capabilities: Specified supported A2A features (streaming, push notifications, etc.)</li>
<li>Default I/O modes: Default media types for agent</li>
<li>Skills: List of the AgentSkill objects outlined earlier</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<header><a href="#1" title=" ">◇ A2A</a></header>
<h2 id="agent-executor">Agent Executor</h2>
<p>Core logic of how A2A agents process requests &amp; generate responses. The A2A SDK provides the abstract class <code>a2a.server.agent_execution.AgentExecutor</code> to implement.</p>
<p>Links the A2A protocol plumbing together (A2A SDK &amp; logic of our agent). SDK handles HTTP, JSON-RPC &amp; event management.</p>
<p><strong>The AgentExecutor class has two main methods:</strong></p>
<ul>
<li><code>Execute(self, context: RequestContext, event_queue: EventQueue)</code>: Handles requests which expect a response or event stream</li>
<li><code>Cancel(self, context: RequestContext, event_queue: EventQueue)</code>: Handles requests to cancel running tasks</li>
</ul>
<p>Event queues are objects which queue up data to be sent.</p>
<footer>Accenture 2025</footer>
</section>

<h2 id="serving-a2a-content">Serving A2A Content</h2>
<p><strong>A2AStarletteApplication:</strong> Class to simplify getting an A2A-compliant HTTP server running. Uses Starlette for the web server and runs with Uvicorn.</p>
<p><strong>DefaultRequestHandler:</strong> Takes AgentExecutor and TaskStore, applies appropriate routing for new A2A RPC calls.</p>
<p><strong>TaskStore:</strong> Manages lifecycle of tasks, useful for stateful interactions, streaming, and resubscription.</p>
<p><strong>Uvicorn.run(Server_builder.build()):</strong> A2AStarletteApplication has a build method to construct the application, then run using uvicorn.run for HTTP access.</p>

<h2 id="about-gemini-live-api">About Gemini Live API</h2>
<p><strong>Gemini Live offers:</strong></p>
<ul>
<li>Real-time multimodal understanding (video and audio)</li>
<li>Integration with tools such as function calling and grounding with Google Search</li>
<li>Low latency → almost human-like interactions</li>
<li>Multilingual support</li>
<li>With native audio: Gemini can understand the user's tone of voice</li>
<li>Context awareness, disregards ambient conversations</li>
</ul>
<footer>Accenture 2025</footer>
</section>

<h2 id="audio-requirements">Audio Requirements</h2>
<p><strong>Audio must be in these formats:</strong></p>
<ul>
<li><strong>Input audio:</strong> Raw 16-bit PCM audio at 16kHz, little-endian</li>
<li><strong>Output audio:</strong> Raw 16-bit PCM audio at 24kHz, little-endian</li>
</ul>
<p>ADK natively supports using Gemini Live, but you need to use a Gemini model which supports the Live API.</p>
<p>See <a href="https://cloud.google.com/vertex-ai/generative-ai/docs/live-api">https://cloud.google.com/vertex-ai/generative-ai/docs/live-api</a> for a list of model options.</p>
<p>Right now the Gemini Live API is only supported with the <code>gemini-live-2.5-flash</code> models.</p>
<footer>Accenture 2025</footer>

<h2 id="using-the-api">Using the API</h2>
<p><strong>Implementation options:</strong></p>
<ul>
<li><strong>Server-to-server:</strong> Backend connects to the Live API using WebSockets. Clients send streams of data to your server which then forwards it to the API</li>
<li><strong>Client-to-server:</strong> Frontend code connects directly to Google's servers using WebSockets to stream data</li>
<li>Client-to-server is more performant and easier to set up</li>
</ul>
<p><strong>Documentation:</strong> <a href="https://ai.google.dev/gemini-api/docs/live-guide">https://ai.google.dev/gemini-api/docs/live-guide</a></p>
<footer>Accenture 2025</footer>

<p>The Model Context Protocol (MCP) is an open standard for connecting AI applications to external data sources and tools.</p>
<p><strong>Key features:</strong></p>
<ul>
<li>Enables agents to access external data sources</li>
<li>Provides standardized way to connect to databases, APIs, and other services</li>
<li>Complements A2A for comprehensive agent capabilities</li>
<li>Developed by Anthropic, now widely adopted</li>
</ul>
<footer>Accenture 2025</footer>

<h2 id="key-reflections">Key Reflections</h2>
<p>As we've explored today, Google's Agent Development Stack—comprising ADK, A2A, MCP, and the Gemini Live API—represents a powerful shift in how we build, deploy, and scale intelligent agents.</p>
<p><strong>Key insights:</strong></p>
<ul>
<li><strong>Modular by Design:</strong> Each component is purpose-built but interoperable, enabling flexible, scalable agent architectures</li>
<li><strong>Open Standards:</strong> Protocols like A2A and MCP are paving the way for cross-platform, multi-agent collaboration</li>
<li><strong>Voice-First:</strong> Gemini Live and ADK bring real-time, multimodal interaction to the forefront of customer experience</li>
<li><strong>Developer-Centric:</strong> With Python-first SDKs, callback hooks, and CI/CD support, this stack empowers engineers to build with precision and control</li>
</ul>
